name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Exact extension SemVer
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions: { contents: write }
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - name: Verify and package
        run: |
          set -euo pipefail
          git fetch origin main
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main
          declared="$(node -p "require('./package.json').version")"
          test "$declared" = "${{ inputs.version }}"
          test -f "changelogs/$declared.md"
          npm test
          npx --yes @vscode/vsce package --pre-release -o "eidosc-tools-$declared.vsix"
      - name: Publish GitHub release
        env: { GH_TOKEN: "${{ github.token }}" }
        run: gh release create "v${{ inputs.version }}" "eidosc-tools-${{ inputs.version }}.vsix" --target "$GITHUB_SHA" --prerelease --title "v${{ inputs.version }}" --notes-file "changelogs/${{ inputs.version }}.md"
