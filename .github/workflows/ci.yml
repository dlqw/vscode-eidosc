name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - run: npm test
      - name: Verify version and changelog
        shell: bash
        run: |
          set -euo pipefail
          version="$(node -p "require('./package.json').version")"
          if [[ -f "changelogs/$version.md" ]]; then
            exit 0
          fi
          test -n "$(find "changelogs/$version" -maxdepth 1 -type f -name "$version-*.md" -print -quit)"
